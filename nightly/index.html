<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJLab Nightly Benchmarks</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --border: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .timestamp {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
        }

        .card-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-value {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 0.25rem;
        }

        .card-value.positive {
            color: var(--accent-green);
        }

        .card-value.negative {
            color: var(--accent-red);
        }

        /* Category sections */
        .category-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .category-header:hover {
            background: #282e36;
        }

        .category-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .category-toggle {
            color: var(--text-secondary);
            transition: transform 0.2s;
        }

        .category-section.collapsed .category-toggle {
            transform: rotate(-90deg);
        }

        .category-section.collapsed .category-charts {
            display: none;
        }

        .category-charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1rem;
            padding: 1.5rem;
        }

        .metric-chart {
            background: var(--bg-primary);
            border-radius: 4px;
            padding: 1rem;
        }

        .metric-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .metric-title {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .metric-value {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .metric-delta {
            font-size: 0.75rem;
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
        }

        .metric-delta.positive {
            background: rgba(63, 185, 80, 0.2);
            color: var(--accent-green);
        }

        .metric-delta.negative {
            background: rgba(248, 81, 73, 0.2);
            color: var(--accent-red);
        }

        .chart-wrapper {
            height: 150px;
        }

        /* Runs table */
        .runs-table {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .runs-table h2 {
            font-size: 0.875rem;
            font-weight: 600;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:hover {
            background: var(--bg-tertiary);
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .chart-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .category-charts {
                grid-template-columns: 1fr;
            }

            .summary-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>MJLab Nightly Benchmarks</h1>
                <div class="chart-subtitle">Tracking metrics across runs</div>
            </div>
            <span class="timestamp">Updated: 2025-12-05</span>
        </header>

        <div class="summary-cards" id="summary-cards"></div>

        <div id="categories-container"></div>

        <div class="runs-table">
            <h2>All Runs</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Run Name</th>
                        <th>Train/mean_reward</th>
                        <th>Train/mean_episode_length</th>
                    </tr>
                </thead>
                <tbody id="runs-tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const runs = [{"id": "viz840w8", "name": "2025-12-05_17-25-32", "url": "https://wandb.ai/gcbc_researchers/mjlab/runs/viz840w8", "created_at": "2025-12-06T01:25:38Z", "tags": ["nightly"], "metrics": {"Episode_Reward": {"action_rate_l2": -0.3440324664115906, "joint_limit": -0.002063468564301729, "motion_body_ang_vel": 0.7630945444107056, "motion_body_lin_vel": 0.8689963221549988, "motion_body_ori": 0.8657832145690918, "motion_body_pos": 0.9782323837280272, "motion_global_root_ori": 0.47507983446121216, "motion_global_root_pos": 0.3871406018733978, "self_collisions": -0.006288759410381317}, "Episode_Termination": {"anchor_ori": 0, "anchor_pos": 0, "ee_body_pos": 0.0833333358168602, "time_out": 8}, "Loss": {"entropy": -2.056006097793579, "learning_rate": 7.593750000000002e-05, "surrogate": -0.00628023983881576, "value": 0.010640854062512518}, "Metrics": {"motion/error_anchor_ang_vel": 0.94920015335083, "motion/error_anchor_lin_vel": 0.2924744784832001, "motion/error_anchor_pos": 0.14274930953979492, "motion/error_anchor_rot": 0.08509748429059982, "motion/error_body_ang_vel": 1.5143990516662598, "motion/error_body_lin_vel": 0.3253359794616699, "motion/error_body_pos": 0.03534012660384178, "motion/error_body_rot": 0.12734439969062805, "motion/error_joint_pos": 0.516251802444458, "motion/error_joint_vel": 5.962419033050537, "motion/sampling_entropy": 0.9527305960655212, "motion/sampling_top1_bin": 0.3333333730697632, "motion/sampling_top1_prob": 0.3348730802536011}, "Perf": {"collection_time": 0.7453243732452393, "learning_time": 0.05617952346801758, "total_fps": 122649}, "Policy": {"mean_noise_std": 0.2295350283384323}, "Train": {"mean_episode_length": 500, "mean_reward": 39.87069725036621}}}];
        const metricsByCategory = {"Episode_Reward": ["action_rate_l2", "joint_limit", "motion_body_ang_vel", "motion_body_lin_vel", "motion_body_ori", "motion_body_pos", "motion_global_root_ori", "motion_global_root_pos", "self_collisions"], "Episode_Termination": ["anchor_ori", "anchor_pos", "ee_body_pos", "time_out"], "Loss": ["entropy", "learning_rate", "surrogate", "value"], "Metrics": ["motion/error_anchor_ang_vel", "motion/error_anchor_lin_vel", "motion/error_anchor_pos", "motion/error_anchor_rot", "motion/error_body_ang_vel", "motion/error_body_lin_vel", "motion/error_body_pos", "motion/error_body_rot", "motion/error_joint_pos", "motion/error_joint_vel", "motion/sampling_entropy", "motion/sampling_top1_bin", "motion/sampling_top1_prob"], "Perf": ["collection_time", "learning_time", "total_fps"], "Policy": ["mean_noise_std"], "Train": ["mean_episode_length", "mean_reward"]};

        // Sort runs by date, oldest first.
        runs.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

        const chartColors = {
            'Train': '#3fb950',
            'Metrics': '#58a6ff',
            'Episode_Reward': '#a371f7',
            'Episode_Termination': '#f85149',
            'Loss': '#f0883e',
            'Perf': '#79c0ff',
            'Policy': '#d2a8ff'
        };

        Chart.defaults.color = '#8b949e';
        Chart.defaults.borderColor = '#30363d';

        function getMetricData(category, metricName) {
            return runs.map(run => ({
                x: new Date(run.created_at),
                y: run.metrics[category]?.[metricName] ?? null,
                name: run.name,
                url: run.url
            })).filter(d => d.y !== null);
        }

        function calculateDelta(data) {
            if (data.length < 2) return null;
            const latest = data[data.length - 1].y;
            const previous = data[data.length - 2].y;
            if (previous === 0) return null;
            return ((latest - previous) / Math.abs(previous) * 100).toFixed(1);
        }

        function createMetricChart(container, category, metricName, color) {
            const data = getMetricData(category, metricName);
            if (data.length === 0) return;

            const delta = calculateDelta(data);
            const latestValue = data[data.length - 1]?.y;

            const chartDiv = document.createElement('div');
            chartDiv.className = 'metric-chart';
            chartDiv.innerHTML = `
                <div class="metric-header">
                    <span class="metric-title">${metricName}</span>
                    <div>
                        <span class="metric-value">${latestValue?.toFixed(2) ?? 'N/A'}</span>
                        ${delta ? `<span class="metric-delta ${delta > 0 ? 'positive' : 'negative'}">
                            ${delta > 0 ? '+' : ''}${delta}%
                        </span>` : ''}
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas></canvas>
                </div>
            `;
            container.appendChild(chartDiv);

            const ctx = chartDiv.querySelector('canvas').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        data: data,
                        borderColor: color,
                        backgroundColor: color + '20',
                        borderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        pointBackgroundColor: color,
                        pointBorderColor: '#0d1117',
                        pointBorderWidth: 1,
                        tension: 0.1,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: (items) => items[0]?.raw?.name || '',
                                label: (item) => [
                                    `${metricName}: ${item.raw.y?.toFixed(4)}`,
                                    `Date: ${new Date(item.raw.x).toLocaleDateString()}`
                                ]
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'day' },
                            display: true,
                            ticks: { maxTicksLimit: 4, font: { size: 10 } }
                        },
                        y: {
                            display: true,
                            ticks: { maxTicksLimit: 4, font: { size: 10 } }
                        }
                    },
                    onClick: (event, elements) => {
                        if (elements.length > 0) {
                            const url = elements[0].element.$context.raw.url;
                            if (url) window.open(url, '_blank');
                        }
                    }
                }
            });
        }

        function initCategories() {
            const container = document.getElementById('categories-container');

            const categoryOrder = ['Train', 'Loss', 'Perf', 'Metrics', 'Episode_Reward', 'Episode_Termination', 'Policy'];
            const sortedCategories = Object.keys(metricsByCategory).sort((a, b) => {
                const aIdx = categoryOrder.indexOf(a);
                const bIdx = categoryOrder.indexOf(b);
                if (aIdx === -1 && bIdx === -1) return a.localeCompare(b);
                if (aIdx === -1) return 1;
                if (bIdx === -1) return -1;
                return aIdx - bIdx;
            });

            sortedCategories.forEach(category => {
                const metrics = metricsByCategory[category];
                if (!metrics || metrics.length === 0) return;

                const color = chartColors[category] || '#58a6ff';

                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `
                    <div class="category-header" onclick="this.parentElement.classList.toggle('collapsed')">
                        <span class="category-title">${category}</span>
                        <span class="category-toggle">▼</span>
                    </div>
                    <div class="category-charts"></div>
                `;
                container.appendChild(section);

                const chartsContainer = section.querySelector('.category-charts');
                metrics.forEach(metric => {
                    createMetricChart(chartsContainer, category, metric, color);
                });
            });
        }

        function initSummary() {
            const container = document.getElementById('summary-cards');
            if (runs.length === 0) {
                container.innerHTML = '';
                return;
            }

            const latestRun = runs[runs.length - 1];
            const previousRun = runs[runs.length - 2];

            const latestReward = latestRun?.metrics?.Train?.mean_reward;
            const previousReward = previousRun?.metrics?.Train?.mean_reward;
            const rewardDelta = latestReward && previousReward
                ? ((latestReward - previousReward) / Math.abs(previousReward) * 100).toFixed(1)
                : null;

            container.innerHTML = `
                <div class="card">
                    <div class="card-label">Total Runs</div>
                    <div class="card-value">${runs.length}</div>
                </div>
                <div class="card">
                    <div class="card-label">Latest Run</div>
                    <div class="card-value" style="font-size: 1rem;">${latestRun?.name || 'N/A'}</div>
                </div>
                <div class="card">
                    <div class="card-label">Mean Reward</div>
                    <div class="card-value">${latestReward?.toFixed(2) || 'N/A'}</div>
                </div>
                <div class="card">
                    <div class="card-label">vs Previous</div>
                    <div class="card-value ${rewardDelta > 0 ? 'positive' : rewardDelta < 0 ? 'negative' : ''}">
                        ${rewardDelta ? (rewardDelta > 0 ? '+' : '') + rewardDelta + '%' : 'N/A'}
                    </div>
                </div>
            `;
        }

        function initTable() {
            const tbody = document.getElementById('runs-tbody');
            if (runs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No runs found</td></tr>';
                return;
            }

            // Show newest first.
            const sortedRuns = [...runs].reverse();

            tbody.innerHTML = sortedRuns.map(run => `
                <tr>
                    <td>${new Date(run.created_at).toLocaleDateString()}</td>
                    <td><a href="${run.url}" target="_blank">${run.name}</a></td>
                    <td>${run.metrics?.Train?.mean_reward?.toFixed(2) || 'N/A'}</td>
                    <td>${run.metrics?.Train?.mean_episode_length?.toFixed(1) || 'N/A'}</td>
                </tr>
            `).join('');
        }

        initSummary();
        initCategories();
        initTable();
    </script>
</body>
</html>
